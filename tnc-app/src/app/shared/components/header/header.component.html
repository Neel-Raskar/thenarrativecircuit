<header class="header" [class.header--scrolled]="isScrolled">
  <div class="header__container">
    <a routerLink="/" class="header__logo" (click)="closeMobileMenu()">
      <img src="/logo.jpg" alt="The Narrative Circuit" class="header__logo-img">
      <span class="header__logo-text">
        <span class="header__logo-text--first">{{ brandNameFirst }}</span>
        <span class="header__logo-text--second">{{ brandNameSecond }}</span>
      </span>
    </a>

    <nav class="header__nav" [class.header__nav--open]="isMobileMenuOpen">
      @for (link of navLinks; track link.path) {
        <a 
          [routerLink]="link.path" 
          routerLinkActive="header__link--active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="header__link"
          (click)="closeMobileMenu()"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <button 
      class="header__cta" 
      [routerLink]="contactPath"
      (click)="closeMobileMenu()"
    >
      Get in Touch
    </button>

    <button 
      class="header__mobile-toggle"
      (click)="toggleMobileMenu()"
      [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'"
      [class.header__mobile-toggle--open]="isMobileMenuOpen"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
